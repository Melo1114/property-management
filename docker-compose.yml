version: "3.9"

# ── Local development stack ────────────────────────────────────────────────────
# Usage:
#   docker compose up --build          # start everything
#   docker compose up -d               # detached
#   docker compose exec backend bash   # shell into Django container
#   docker compose down -v             # stop + remove volumes
#
# First run only (run migrations and create superuser):
#   docker compose exec backend python manage.py migrate
#   docker compose exec backend python manage.py createsuperuser

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       aurumkeys
      POSTGRES_USER:     aurumkeys
      POSTGRES_PASSWORD: aurumkeys
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurumkeys"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + result backend) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: backend/.env
    environment:
      DEBUG:        "True"
      DATABASE_URL: "postgres://aurumkeys:aurumkeys@db:5432/aurumkeys"
      DB_SSLMODE:   "disable"
      REDIS_URL:    "redis://redis:6379/0"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app                    # live-reload: code changes reflected instantly
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn backend.wsgi:application
               --bind 0.0.0.0:8000
               --workers 2
               --reload"

  # ── Celery worker ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: backend/.env
    environment:
      DATABASE_URL: "postgres://aurumkeys:aurumkeys@db:5432/aurumkeys"
      DB_SSLMODE:   "disable"
      REDIS_URL:    "redis://redis:6379/0"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A backend worker --loglevel=info

  # ── Celery beat (scheduled tasks) ───────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: backend/.env
    environment:
      DATABASE_URL: "postgres://aurumkeys:aurumkeys@db:5432/aurumkeys"
      DB_SSLMODE:   "disable"
      REDIS_URL:    "redis://redis:6379/0"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A backend beat --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000/api"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
