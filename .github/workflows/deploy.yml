name: CI / CD — AurumKeys

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION:   "22"
  # Azure Container Registry — set these in GitHub repo secrets
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}   # e.g. propertypro.azurecr.io
  BACKEND_IMAGE:    ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}
  FRONTEND_IMAGE:   ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}

# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ── 1. Backend tests ────────────────────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       test_db
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY:    test-secret-key-for-ci-only
      DEBUG:         "True"
      DATABASE_URL:  postgres://test_user:test_pass@localhost:5432/test_db
      DB_SSLMODE:    disable
      REDIS_URL:     redis://localhost:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        run: python manage.py test --verbosity=2

      - name: Check for missing migrations
        working-directory: backend
        run: python manage.py migrate --check


  # ── 2. Frontend lint + build check ──────────────────────────────────────────
  test-frontend:
    name: Frontend build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.azurewebsites.net/api
        run: pnpm run build


  # ── 3. Build & push Docker images (main branch only) ────────────────────────
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags:       ${{ env.BACKEND_IMAGE }},
                      ${{ secrets.ACR_LOGIN_SERVER }}/backend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Frontend image ───────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       ./Dockerfile.frontend
          push:       true
          tags:       ${{ env.FRONTEND_IMAGE }},
                      ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max


  # ── 4. Deploy to Azure App Service ──────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Deploy backend ───────────────────────────────────────────────────────
      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name:   ${{ secrets.AZURE_BACKEND_APP_NAME }}
          images:     ${{ env.BACKEND_IMAGE }}

      # ── Run Django migrations post-deploy ────────────────────────────────────
      # Azure App Service supports SSH commands via az webapp ssh
      - name: Run migrations
        run: |
          az webapp exec \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_BACKEND_APP_NAME }} \
            --command "python manage.py migrate --noinput"

      # ── Deploy frontend ──────────────────────────────────────────────────────
      - name: Deploy frontend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          images:   ${{ env.FRONTEND_IMAGE }}

      - name: Log out of Azure
        if: always()
        run: az logout
